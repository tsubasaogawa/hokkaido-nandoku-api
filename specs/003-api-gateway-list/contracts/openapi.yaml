openapi: 3.0.0
info:
  title: Hokkaido Nandoku API
  version: 1.0.0
paths:
  /list:
    get:
      summary: Get a list of nandoku placenames
      responses:
        '200':
          description: A list of placenames
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                    - yomi
                  properties:
                    id:
                      type: integer
                      description: The unique identifier of the place.
                      example: 1
                    name:
                      type: string
                    yomi:
                      type: string
